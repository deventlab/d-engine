[cluster]
node_id = 1
listen_address = "0.0.0.0:9081"
initial_cluster = [
    { id = 1, address = "0.0.0.0:9081", role = 0, status = 2 },
    { id = 2, address = "0.0.0.0:9082", role = 0, status = 2 },
    { id = 3, address = "0.0.0.0:9083", role = 0, status = 2 }
]
db_root_dir = "./data/n1"
log_dir = "./logs"

[raft.replication]
# Maximum number of commands to accumulate in a single batch during drain operations
max_batch_size = 500

[raft.metrics]
enable_backpressure = false
enable_batch = false

[raft.snapshot]
enable = false
